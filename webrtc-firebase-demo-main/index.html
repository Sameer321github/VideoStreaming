<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WebRTC Demo</title>
  </head>
  <body>
  <div class="videos">
    <div class="video-panel">
      <h3>Local Stream</h3>
      <video id="webcamVideo" autoplay playsinline muted></video>
      <div class="transcript-box" id="localTranscript">
        <p class="transcript-label">Your Transcript</p>
        <div class="transcript-content" id="localTranscriptContent">Transcript will appear here...</div>
      </div>
    </div>
    <div class="video-panel">
      <h3>Remote Stream</h3>
      <video id="remoteVideo" autoplay playsinline></video>
      <div class="transcript-box" id="remoteTranscript">
        <p class="transcript-label">Remote Transcript</p>
        <div class="transcript-content" id="remoteTranscriptContent">Transcript will appear here...</div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button id="webcamButton">Start webcam</button>
    <button id="toggleMic" disabled>🎙️ Mute</button>
    <button id="toggleCamera" disabled>📷 Hide Camera</button>
    <div id="debateDuration" class="duration">Duration: 00:00</div>
    <button id="callButton" disabled>Create Call</button>
    <input id="callInput" placeholder="Enter Call ID" />
    <button id="answerButton" disabled>Answer</button>
    <button id="hangupButton" disabled>Hangup</button>
  </div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script type="module" src="/main.js"></script>
</body>
</html>
